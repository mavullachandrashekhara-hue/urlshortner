<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium gradient for the background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#764ba2" />
      <stop offset="50%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#4fd1c5" />
    </linearGradient>
    <!-- Soft shadow filter for the icon to give it depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" />

  <!-- Centered, white, stylized chain link icon -->
  <g transform="translate(96, 96) scale(13.333)" filter="url(#dropShadow)">
    <path fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M10 14a3.5 3.5 0 0 0 5 0l4-4a3.5 3.5 0 0 0 -5 -5l-.5 .5" />
    <path fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M14 10a3.5 3.5 0 0 0 -5 0l-4 4a3.5 3.5 0 0 0 5 5l.5 -.5" />
  </g>
</svg>
